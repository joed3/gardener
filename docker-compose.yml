services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/garden.db:/app/garden.db
      - hf_cache:/root/.cache/huggingface
      - inat_cache:/root/.cache/inat21
    environment:
      - DATABASE_URL=sqlite:///./garden.db
      - INAT_CACHE_DIR=/root/.cache/inat21
      - PLANT_MODEL_REPO=hf_hub:timm/eva02_large_patch14_clip_336.merged2b_ft_inat21
      - LOG_LEVEL=DEBUG

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend

volumes:
  hf_cache:
  inat_cache:
